app = 'peermesh-relay'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  PROXY_PORT = '8081'

# WebSocket + health endpoint (port 80/443 via Fly HTTP layer)
[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

# Raw TCP proxy port — requires dedicated IPv4 (fly ips allocate-v4)
[[services]]
  protocol = 'tcp'
  internal_port = 8081
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8081

  [services.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[[restart]]
  policy = 'always'
  max_retries = 10
